<!DOCTYPE html>
<html lang="pt-BR">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta http-equiv="refresh" content="0; url=LOTOSTAT_PRO.html">
      <title>LOTOSTAT PRO — Redirecionando...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
          /* Paleta Caixa Econômica Federal */
          :root {
                  --caixa-azul:    #005c9e;
                  --caixa-azul2:   #0074c2;
                  --caixa-laranja: #f7941d;
                  --caixa-laranja2:#ffaa44;
                  --caixa-bg:      #f0f2f5;
                  --caixa-white:   #ffffff;
                  --caixa-text:    #1a1a2e;
                  --caixa-gray:    #6b7280;
          }
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          html, body {
                  height: 100%;
                  background: var(--caixa-azul);
                  font-family: 'Source Sans 3', Arial, sans-serif;
                  display: flex;
                  align-items: center;
                  justify-content: center;
          }
          .container {
                  text-align: center;
                  color: var(--caixa-white);
                  padding: 40px 32px;
          }
          .logo-bar {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 12px;
                  margin-bottom: 28px;
          }
          .logo-icon {
                  width: 56px; height: 56px;
                  background: var(--caixa-laranja);
                  border-radius: 12px;
                  display: flex; align-items: center; justify-content: center;
                  font-size: 28px; font-weight: 700; color: var(--caixa-white);
          }
          .logo-text { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
          .logo-text em { color: var(--caixa-laranja); font-style: normal; }
          .msg { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 24px; }
          .spinner {
                  width: 36px; height: 36px;
                  border: 3px solid rgba(255,255,255,0.2);
                  border-top-color: var(--caixa-laranja);
                  border-radius: 50%;
                  animation: spin 0.8s linear infinite;
                  margin: 0 auto;
          }
          @keyframes spin { to { transform: rotate(360deg); } }
          .link { display: inline-block; margin-top: 20px; color: var(--caixa-laranja2); font-size: 13px; }
          .link a { color: inherit; }
        </style>
  </head>
  <body>
      <div class="container">
            <div class="logo-bar">
                    <div class="logo-icon">L</div>
                    <div class="logo-text">LOTOSTAT <em>PRO</em></div>
            </div>
          <p class="msg">Carregando o sistema...</p>
          <div class="spinner"></div>
          <p class="link">
            <a href="LOTOSTAT_PRO.html">Clique aqui se não for redirecionado automaticamente</a>
          </p>
      </div>
    <script>
          setTimeout(function(){ window.location.replace('LOTOSTAT_PRO.html'); }, 100);
    </script>
  </body>
</html>
